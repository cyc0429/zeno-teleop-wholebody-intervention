# Piper dual arm configuration file
# This file contains node-specific parameters: CAN port, topics, gripper settings
#
# HOW IT WORKS:
# - Parameters are loaded to each node's private namespace
# - Control parameters (kp, kd, etc.) are in piper_ctrl_mit.yaml
# - Modify this file and restart the launch to apply changes

# ============================================================================
# Robot side configuration (piper_dual_robot.launch)
# ============================================================================

# Left arm robot node
piper_ctrl_left_node:
  # Communication
  can_port: "can_left"
  topic_prefix: "/robot/arm_left/"
  
  # Basic settings
  auto_enable: true
  enforce_joint_limits: false
  
  # Gripper settings
  gripper_exist: true
  gripper_val_mutiple: 0.75
  enable_gripper: true
  enable_gripper_haptic: false
  gripper_range: 0.08
  gripper_reverse: false
  shutdown_mode: "hold"
  
  # Topic names (relative to topic_prefix)
  gripper_pos_cmd_topic: "gripper_pos_cmd"
  gripper_effort_cmd_topic: "gripper_effort_cmd"
  p:
    joint_pos_cmd_topic: "joint_pos_cmd"
  mit:
    joint_pos_cmd_topic: "joint_pos_cmd"
    joint_vel_cmd_topic: "joint_vel_cmd"
    joint_tor_cmd_topic: "joint_tor_cmd"
    joint_states_compensated_topic: "joint_states_compensated"
  
  # Topic remapping (absolute paths)
  remap:
     #joint_pos_cmd_to: "/robot/arm_left/vla_joint_cmd"
     #gripper_pos_cmd_to: "/robot/arm_left/vla_joint_cmd"
    # Arbiter path: robot executes arbiter-selected command.
    joint_pos_cmd_to: "/robot/arm_left/joint_pos_cmd"
    gripper_pos_cmd_to: "/robot/arm_left/joint_pos_cmd"

# Right arm robot node
piper_ctrl_right_node:
  # Communication
  can_port: "can_right"
  topic_prefix: "/robot/arm_right/"
  
  # Basic settings
  auto_enable: true
  enforce_joint_limits: false

  # Gripper settings
  gripper_exist: true
  gripper_val_mutiple: 1.25
  enable_gripper: true
  enable_gripper_haptic: false
  gripper_range: 0.08
  gripper_reverse: false
  shutdown_mode: "hold"
  
  # Topic names (relative to topic_prefix)
  gripper_pos_cmd_topic: "gripper_pos_cmd"
  gripper_effort_cmd_topic: "gripper_effort_cmd"
  p:
    joint_pos_cmd_topic: "joint_pos_cmd"
  mit:
    joint_pos_cmd_topic: "joint_pos_cmd"
    joint_vel_cmd_topic: "joint_vel_cmd"
    joint_tor_cmd_topic: "joint_tor_cmd"
    joint_states_compensated_topic: "joint_states_compensated"
  
  # Topic remapping (absolute paths)
  remap:
     #joint_pos_cmd_to: "/robot/arm_right/vla_joint_cmd"
     #gripper_pos_cmd_to: "/robot/arm_right/vla_joint_cmd"
    # Arbiter path: robot executes arbiter-selected command.
    joint_pos_cmd_to: "/robot/arm_right/joint_pos_cmd"
    gripper_pos_cmd_to: "/robot/arm_right/joint_pos_cmd"

# ============================================================================
# Teleop side configuration (piper_dual_teleop.launch)
# ============================================================================

# Left arm teleop node
piper_teleop_left_node:
  # Communication
  can_port: "can_left"
  topic_prefix: "/teleop/arm_left/"
  
  # Basic settings
  auto_enable: true
  # This teleop arm model differs from default URDF limits in this repo.
  # Disable local clamp to avoid command distortion (e.g. joint3 clipped to <=0).
  enforce_joint_limits: false
  
  # Gripper settings
  gripper_exist: true
  gripper_val_mutiple: 1.0
  enable_gripper: true
  enable_gripper_haptic: true
  gripper_range: 0.08
  gripper_reverse: true
  shutdown_mode: "reset_disable"
  
  # Topic names (relative to topic_prefix)
  gripper_pos_cmd_topic: "gripper_pos_cmd"
  gripper_effort_cmd_topic: "gripper_effort_cmd"
  p:
    joint_pos_cmd_topic: "joint_pos_cmd"
  mit:
    joint_pos_cmd_topic: "joint_pos_cmd"
    joint_vel_cmd_topic: "joint_vel_cmd"
    joint_tor_cmd_topic: "joint_tor_cmd"
    joint_states_compensated_topic: "joint_states_compensated"
  
  # Topic remapping (absolute paths)
  remap:
    joint_pos_cmd_to: "/teleop/arm_left/joint_states_single"
    # joint_tor_cmd_to: "/robot/arm_left/joint_states_single"
    # joint_states_compensated_to: "/robot/arm_left/joint_states_compensated"
    gripper_pos_cmd_to: "/teleop/arm_left/joint_states_single"
    # gripper_effort_cmd_to: "/robot/arm_left/joint_states_single"
  master_slave:
    enable: true
    master_position_topic: "/robot/arm_left/joint_states_single"
    master_flag_topic: "/teleop/slave_follow_flag"
    kp_follow: [10, 10, 10, 10, 10, 10]
    force_cmd_use_follow_kp: true
    force_cmd_skip_joint_limit_clamp: true
    # Safety guards to avoid startup snap-to-zero when master stream is not ready.
    require_master_before_follow: true
    master_position_timeout_sec: 0.5
    follow_position_max_step_rad: 0.03

